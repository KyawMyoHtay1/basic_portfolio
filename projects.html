<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Kyaw Myo Htay</title>
  <script src="js/theme-init.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/portfolio.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="js/theme-config.js"></script>
</head>
<body data-page="projects" class="min-h-screen bg-gray-50 font-sans text-gray-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <div id="site-header"></div>
  <main class="page-enter mx-auto max-w-6xl px-4 pb-20 pt-28 sm:px-6 lg:px-8">
    <p class="text-sm font-semibold uppercase tracking-widest text-indigo-600 dark:text-indigo-400">Portfolio</p>
    <h1 class="mt-2 text-4xl font-bold text-gray-900 dark:text-white">Projects</h1>
    <p class="mt-4 text-gray-600 dark:text-slate-400">Click any card for full details. Filter by category.</p>
    <div class="mt-8 flex flex-wrap gap-2">
      <button data-filter="all" type="button" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white">All</button>
      <button data-filter="web" type="button" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-white/20 dark:bg-transparent dark:text-slate-300 dark:hover:bg-white/5">Web</button>
      <button data-filter="mobile" type="button" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-white/20 dark:bg-transparent dark:text-slate-300 dark:hover:bg-white/5">Mobile</button>
      <button data-filter="ux" type="button" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-white/20 dark:bg-transparent dark:text-slate-300 dark:hover:bg-white/5">UI/UX</button>
      <button data-filter="analysis" type="button" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-white/20 dark:bg-transparent dark:text-slate-300 dark:hover:bg-white/5">Analysis</button>
      <button data-filter="other" type="button" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-white/20 dark:bg-transparent dark:text-slate-300 dark:hover:bg-white/5">Database & Desktop</button>
    </div>
    <div id="projects-grid" class="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>
  </main>
  <div id="site-footer"></div>
  <script src="js/page-theme.js"></script>
  <script src="js/project-images.js"></script>
  <script src="js/projects-data.js"></script>
  <script src="js/projects-page.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js" data-base=""></script>
</body>
</html>
