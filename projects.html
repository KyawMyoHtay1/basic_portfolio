<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Kyaw Myo Htay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/portfolio.css">
  <script src="js/theme-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="projects" class="bg-gray-50 font-sans text-gray-900 antialiased">
  <div id="site-sidebar"></div>
  <div class="lg:pl-72">
    <main class="page-enter px-6 py-10 sm:px-10 lg:px-14 lg:py-12">
      <h1 class="section-title text-sm font-bold uppercase tracking-[0.2em]">Experience in projects</h1>
      <p class="mt-6 text-gray-600">Click any card for full details from your CV. Filter by category.</p>
      <div class="mt-8 flex flex-wrap gap-2">
        <button data-filter="all" type="button" class="rounded-lg bg-cv-navy px-4 py-2 text-sm font-medium text-white shadow-md">All</button>
        <button data-filter="web" type="button" class="rounded-lg border-2 border-cv-beige bg-white px-4 py-2 text-sm font-medium text-gray-700">Web</button>
        <button data-filter="mobile" type="button" class="rounded-lg border-2 border-cv-beige bg-white px-4 py-2 text-sm font-medium text-gray-700">Mobile</button>
        <button data-filter="ux" type="button" class="rounded-lg border-2 border-cv-beige bg-white px-4 py-2 text-sm font-medium text-gray-700">UI/UX</button>
        <button data-filter="analysis" type="button" class="rounded-lg border-2 border-cv-beige bg-white px-4 py-2 text-sm font-medium text-gray-700">Analysis</button>
        <button data-filter="other" type="button" class="rounded-lg border-2 border-cv-beige bg-white px-4 py-2 text-sm font-medium text-gray-700">Database & Desktop</button>
      </div>
      <div id="projects-grid" class="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>
    </main>
    <div id="site-footer"></div>
  </div>
  <script src="js/projects-data.js"></script>
  <script src="js/projects-page.js"></script>
  <script src="js/layout.js" data-base=""></script>
</body>
</html>
