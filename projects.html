<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Kyaw Myo Htay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };</script>
</head>
<body data-page="projects" class="min-h-screen bg-slate-950 text-slate-100 font-sans antialiased">
  <div id="site-header"></div>

  <main class="pt-28 pb-20">
    <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <p class="text-sm font-semibold uppercase tracking-widest text-indigo-400">Portfolio</p>
      <h1 class="mt-2 text-4xl font-bold text-white">Projects</h1>
      <p class="mt-4 text-slate-400">Click any card for full details. Filter by category below.</p>

      <div class="mt-8 flex flex-wrap gap-2">
        <button data-filter="all" type="button" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white">All</button>
        <button data-filter="web" type="button" class="rounded-lg px-4 py-2 text-sm font-medium text-slate-400 hover:bg-white/5">Web</button>
        <button data-filter="mobile" type="button" class="rounded-lg px-4 py-2 text-sm font-medium text-slate-400 hover:bg-white/5">Mobile</button>
        <button data-filter="ux" type="button" class="rounded-lg px-4 py-2 text-sm font-medium text-slate-400 hover:bg-white/5">UI/UX</button>
      </div>

      <div id="projects-grid" class="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>

      <div class="mt-20 border-t border-white/10 pt-16">
        <h2 class="text-2xl font-bold text-white">Analysis & design</h2>
        <p class="mt-2 text-slate-400">System analysis and security projects.</p>
        <div id="analysis-list" class="mt-8 grid gap-4 sm:grid-cols-2"></div>
      </div>

      <div class="mt-16">
        <h2 class="text-2xl font-bold text-white">Additional academic projects</h2>
        <p class="mt-2 text-slate-400">NCC Level 3–5 database and desktop work.</p>
        <div id="other-list" class="mt-8 grid gap-3 sm:grid-cols-2"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/projects-data.js"></script>
  <script src="js/projects-page.js"></script>
  <script src="js/layout.js" data-base=""></script>
</body>
</html>
